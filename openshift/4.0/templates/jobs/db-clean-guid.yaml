kind: Template
apiVersion: template.openshift.io/v1
metadata:
  name: db-deploy
  annotations:
    description: "This template deploys a job to remove all rows created by a target GUID."
    tags: "database,clean"
objects:
  - kind: Job
    apiVersion: batch/v1
    metadata:
      generateName: db-clean-guid-
      namespace: ${NAMESPACE}
    spec:
      parallelism: 1
      backoffLimit: 6
      selector:
      template:
        metadata:
          name: db-clean-guid
        spec:
          containers:
            - name: sqlcmd
              image: >-
                image-registry.apps.silver.devops.gov.bc.ca/3cd915-tools/sqlcmd-mssql:latest
              command:
                - /bin/bash
                - "-c"
                - >-
                  PATH="/opt/mssql-tools/bin:$PATH"; 
                  cd /usr/config/psp;
                  git fetch origin ${GIT_BRANCH};
                  git reset -h origin/${GIT_BRANCH};
                  cd /usr/config/psp/source/database/mssql/scripts/dbscripts;
                  chmod 777 delete-by-create-user-guid.sh;
                  ./delete-by-create-user-guid.sh;
              env:
                - name: TEST_USER_GUID
                  value: ${TEST_USER_GUID}
                - name: SERVER_NAME
                  value: ${SERVER_NAME}
                - name: DB_NAME
                  value: ${DB_NAME}
                - name: DB_USER
                  valueFrom:
                    secretKeyRef:
                      name: ${DB_SECRET_NAME}
                      key: DB_USER
                - name: DB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ${DB_SECRET_NAME}
                      key: DB_PASSWORD
              resources: {}
              terminationMessagePath: /dev/termination-log
              terminationMessagePolicy: File
              imagePullPolicy: Always
          restartPolicy: Never
parameters:
  - name: TEST_USER_GUID
    description: the guid of the user to delete content from the database.
    required: true
  - name: SERVER_NAME
    description: The name of the database server
    required: true
  - name: DB_NAME
    description: The name of the database
    required: true
  - name: NAMESPACE
    description: the openshift namespace to run this job in.
    required: true
  - name: GIT_BRANCH
    description: the git branch to pull the database scripts from.
    required: true
  - name: DB_SECRET_NAME
    description: the git branch to pull the database scripts from.
    required: true
