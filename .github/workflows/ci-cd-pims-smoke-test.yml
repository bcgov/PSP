name: CI-CD PIMS smoke test

on:
    workflow_dispatch:
      inputs:
        target_env:
          description: 'Select the environment to deploy to'
          required: true
          type: choice
          options:
            - test
          default: 'test'
    workflow_call:
        inputs:
          target_env:
            required: true
            type: string

jobs:
    run-e2e-smoke-tests:
      name: PIMS e2e smoke tests
      environment: ${{ inputs.target_env }}

      env:
          CI: 'true'
          BASE_URL: ${{ vars.BASE_URL }}
          USER_TRANPSP1_ID: ${{ vars.USER_TRANPSP1_ID }}
          USER_TRANPSP1_PASSWORD: ${{ secrets.USER_TRANPSP1_PASSWORD }}
          USER_TRANPSP1_FULLNAME: ${{ vars.USER_TRANPSP1_FULLNAME }}
          USER_TRANPSP1_EMAIL: ${{ vars.USER_TRANPSP1_EMAIL }}

      runs-on: ubuntu-22.04
      container:
        image: mcr.microsoft.com/playwright:v1.61.0-noble
        options: --user 1001 --ipc=host

      steps:
        - name: Checkout Source Code
          uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #6.0.3

        - name: Setup Node
          uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
          with:
            node-version: "20"

        - name: Install dependencies
          run: npm ci
          working-directory: testing/pims-integration

        - name: Install browsers
          run: npm run install-browsers
          working-directory: testing/pims-integration

        - name: Run Playwright Smoke tests
          run: npm run smoke-tests
          working-directory: testing/pims-integration
        - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          if: ${{ !cancelled() }}
          with:
            name: playwright-report
            path: playwright-report/
            retention-days: 30
