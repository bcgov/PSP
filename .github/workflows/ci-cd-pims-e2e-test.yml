name: CI-CD PIMS e2e test

on:
    workflow_dispatch:
      inputs:
        target_env:
          description: 'Select the environment to deploy to'
          required: true
          type: choice
          options:
            - test
          default: 'test'
    workflow_call:
        inputs:
          target_env:
            required: true
            type: string

jobs:
    run-e2e-smoke-tests:
      name: PIMS e2e smoke tests
      environment: ${{ inputs.target_env }}

      env:
          BASE_URL: ${{ vars.BASE_URL }}
          USER_TRANPSP1_ID: ${{ vars.USER_TRANPSP1_ID }}
          USER_TRANPSP1_PASSWORD: ${{ secrets.USER_TRANPSP1_PASSWORD }}
          USER_TRANPSP1_FULLNAME: ${{ vars.USER_TRANPSP1_FULLNAME }}
          USER_TRANPSP1_EMAIL: ${{ vars.USER_TRANPSP1_EMAIL }}

      runs-on: ubuntu-22.04
      container:
        image: mcr.microsoft.com/playwright:v1.61.0-noble
        options: --user 1001

      steps:
        - name: Checkout Source Code
          uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #6.0.3

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: "20"

        - name: Install dependencies
          run: npm install
          working-directory: testing/pims-integration

        - name: Run Playwright Smoke tests
          run: npx playwright test --project=pims-e2e
          working-directory: testing/pims-integration
        - uses: actions/upload-artifact@v5
          if: ${{ !cancelled() }}
          with:
            name: playwright-report
            path: playwright-report/
            retention-days: 30
