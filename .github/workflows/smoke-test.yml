# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: FT Smoke Test (.NET)
env:
  Base_url: ${{ vars.BASE_URL }}
  CloseBrowserAfterEachTest: true
  RunHeadless: true
  Users__0__User: ${{ secrets.USER_1_USERNAME }}
  Users__0__Password: ${{ secrets.USER_1_PASSWORD }}
  Users__1__User: ${{ secrets.USER_2_USERNAME }}
  Users__1__Password: ${{ secrets.USER_2_PASSWORD }}
on:
  workflow_dispatch
  #push:
  #  branches: [master, dev, test]
  #pull_request:
  #  branches: [master, dev, test]

jobs:
  smoke-test:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        uses: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: 🚀 Run Cucumber Smoke Tests
        run: npx cucumber-js --tags @smokeTest

      - name: 📝 Upload Test Report (Optional)
        if: always() # Run this step even if the tests fail
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: report/cucumber-report.html
